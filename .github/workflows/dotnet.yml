name: Kartist CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    name: Build and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Kartist.sln

      - name: Build solution
        run: dotnet build Kartist.sln --no-restore --configuration Release

      - name: Run tests if available
        shell: bash
        run: |
          if git ls-files '*.Test.csproj' '*.Tests.csproj' | grep -q .; then
            dotnet test Kartist.sln --no-build --configuration Release
          else
            echo 'No test projects found. Skipping tests.'
          fi

      - name: Publish project
        run: dotnet publish Kartist.csproj --no-build --configuration Release --output ./publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: kartist-build-${{ github.run_number }}
          path: ./publish
          retention-days: 30

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
      DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
      HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
      APPSETTINGS_PRODUCTION_JSON: ${{ secrets.APPSETTINGS_PRODUCTION_JSON }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: kartist-build-${{ github.run_number }}
          path: ./publish

      - name: Validate deploy secrets
        shell: bash
        run: |
          test -n "$DEPLOY_URL"
          test -n "$DEPLOY_SECRET"

      - name: Remove server config files from artifact
        shell: bash
        run: |
          rm -f ./publish/web.config
          rm -f ./publish/appsettings.Development.json
          rm -f ./publish/appsettings.Production.json

      - name: Inject production settings from secret
        shell: bash
        run: |
          if [ -n "$APPSETTINGS_PRODUCTION_JSON" ]; then
            echo "$APPSETTINGS_PRODUCTION_JSON" > ./publish/appsettings.json
            echo "Injected production appsettings from secret."
          else
            echo "No APPSETTINGS_PRODUCTION_JSON secret found; keeping default appsettings.json."
          fi

      - name: Zip published files
        run: python3 -c "import shutil; shutil.make_archive('release', 'zip', 'publish')"

      - name: Create deploy signature
        id: deploy_signature
        shell: bash
        run: |
          TIMESTAMP=$(date +%s)
          SIGNATURE=$(printf '%s' "$TIMESTAMP" | openssl dgst -sha256 -hmac "$DEPLOY_SECRET" -hex | sed 's/^.* //')
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"
          echo "signature=$SIGNATURE" >> "$GITHUB_OUTPUT"

      - name: Deploy via signed webhook
        shell: bash
        run: |
          for attempt in 1 2 3; do
            TIMESTAMP=$(date +%s)
            SIGNATURE=$(printf '%s' "$TIMESTAMP" | openssl dgst -sha256 -hmac "$DEPLOY_SECRET" -hex | sed 's/^.* //')
            HTTP_CODE=$(curl -X POST -f -S -s -o /dev/null -w '%{http_code}' \
              --max-time 300 --connect-timeout 30 \
              -H "X-Kartist-Timestamp: $TIMESTAMP" \
              -H "X-Kartist-Signature: $SIGNATURE" \
              -F "file=@release.zip" \
              "$DEPLOY_URL") && exit 0
            echo "Attempt $attempt failed (HTTP $HTTP_CODE). Retrying in 15s..."
            sleep 15
          done
          echo "Deploy failed after 3 attempts"
          exit 1

      - name: Wait for app warmup
        shell: bash
        run: sleep 30

      - name: Health check home page
        shell: bash
        run: |
          TARGET_URL="${HEALTHCHECK_URL:-https://kartistt.com.tr}"
          for i in 1 2 3 4 5; do
            if curl -f -S -s --max-time 30 "$TARGET_URL" > /dev/null; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Health check AI endpoint
        shell: bash
        run: |
          TARGET_URL="${HEALTHCHECK_URL:-https://kartistt.com.tr}/api/health/ai"
          for i in 1 2 3 4 5; do
            if curl -f -S -s --max-time 30 "$TARGET_URL" > /dev/null; then
              exit 0
            fi
            sleep 10
          done
          exit 1



