name: Kartist CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  quality-gate:
    name: Quality and Security Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Check Code Formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic
        continue-on-error: true # Don't block build but notify

      - name: Security Audit (Dependencies)
        run: dotnet list package --vulnerable --include-transitive
        continue-on-error: true

  build:
    name: Build and Publish
    needs: quality-gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Kartist.sln

      - name: Build solution
        run: dotnet build Kartist.sln --no-restore --configuration Release

      - name: Run tests if available
        shell: bash
        run: |
          if git ls-files '*.Test.csproj' '*.Tests.csproj' | grep -q .; then
            dotnet test Kartist.sln --no-build --configuration Release
          else
            echo 'No test projects found. Skipping tests.'
          fi

      - name: Publish project
        run: dotnet publish Kartist.csproj --no-build --configuration Release --output ./publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: kartist-build-${{ github.run_number }}
          path: ./publish
          retention-days: 7

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
      DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
      HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
      APPSETTINGS_PRODUCTION_JSON: ${{ secrets.APPSETTINGS_PRODUCTION_JSON }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: kartist-build-${{ github.run_number }}
          path: ./publish

      - name: Validate deploy secrets
        shell: bash
        run: |
          if [ -z "$DEPLOY_URL" ] || [ -z "$DEPLOY_SECRET" ]; then
            echo "::error::Deployment secrets are missing! Please set DEPLOY_URL and DEPLOY_SECRET."
            exit 1
          fi

      - name: Prepare Artifact
        shell: bash
        run: |
          rm -f ./publish/web.config
          rm -f ./publish/appsettings.Development.json
          rm -f ./publish/appsettings.Production.json
          if [ -n "$APPSETTINGS_PRODUCTION_JSON" ]; then
            echo "$APPSETTINGS_PRODUCTION_JSON" > ./publish/appsettings.json
            echo "Production appsettings injected."
          fi

      - name: Zip and Sign
        id: package
        shell: bash
        run: |
          python3 -c "import shutil; shutil.make_archive('release', 'zip', 'publish')"
          TIMESTAMP=$(date +%s)
          SIGNATURE=$(printf '%s' "$TIMESTAMP" | openssl dgst -sha256 -hmac "$DEPLOY_SECRET" -hex | sed 's/^.* //')
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"
          echo "signature=$SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "zip_size=$(du -h release.zip | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Deploy via Signed Webhook
        shell: bash
        run: |
          curl -X POST -f -S -s \
            -H "X-Kartist-Timestamp: ${{ steps.package.outputs.timestamp }}" \
            -H "X-Kartist-Signature: ${{ steps.package.outputs.signature }}" \
            -F "secret=kartist-deploy-secret-2026" \
            -F "file=@release.zip" \
            "$DEPLOY_URL"

      - name: Warmup and Health Check
        id: health
        shell: bash
        run: |
          sleep 20
          TARGET_URL="${HEALTHCHECK_URL:-https://kartistt.com.tr}"
          echo "Health check targeting: $TARGET_URL"
          for i in 1 2 3; do
             STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$TARGET_URL")
             if [ "$STATUS" == "200" ]; then
                echo "status=success" >> "$GITHUB_OUTPUT"
                exit 0
             fi
             echo "Attempt $i: Status $STATUS... retrying"
             sleep 10
          done
          echo "status=failed" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Generate Job Summary
        if: always()
        run: |
          echo "### 🚀 Kartist Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Feature | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Test | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| Package Size | 📦 ${{ steps.package.outputs.zip_size }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployment | ${{ steps.health.outputs.status == 'success' && '✅ Online' || '❌ Issue Detected' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Health Check | [View Site](${{ env.HEALTHCHECK_URL }}) |" >> $GITHUB_STEP_SUMMARY
