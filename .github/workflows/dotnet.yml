name: Kartist CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET 9.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Publish
      run: dotnet publish --no-build --configuration Release --output ./publish

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kartist-build-${{ github.run_number }}
        path: ./publish
        retention-days: 30

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: kartist-build-${{ github.run_number }}
        path: ./publish

    - name: Enable Maintenance Mode
      run: |
        curl -T app_offline.htm --ftp-create-dirs ftp://${{ secrets.FTP_SERVER }}/httpdocs/app_offline.htm --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" --ftp-ssl -k
      continue-on-error: true

    - name: Wait for maintenance page to activate
      run: sleep 5

    - name: Deploy files to server
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish/
        server-dir: httpdocs/
        dangerous-clean-slate: false
        timeout: 120000

    - name: Disable Maintenance Mode
      run: |
        curl ftp://${{ secrets.FTP_SERVER }}/httpdocs/ -X "DELE app_offline.htm" --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" --ftp-ssl -k
      continue-on-error: true

    - name: Verify deployment
      run: |
        echo "Deployment completed successfully! Site should be back online at https://kartistt.com.tr"
