name: Kartist CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET 9.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Publish
      run: dotnet publish --no-build --configuration Release --output ./publish

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kartist-build-${{ github.run_number }}
        path: ./publish
        retention-days: 30

  deploy:
    name: Deploy to Server (PHP Webhook)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: kartist-build-${{ github.run_number }}
        path: ./publish

    - name: List files for debug
      run: ls -R ./publish

    - name: Zip Published Files
      run: 7z a release.zip ./publish/*

    - name: Deploy via Native C# API Webhook
      run: |
        curl -X POST -f -S -s -F "secret=${{ secrets.DEPLOY_SECRET }}" -F "file=@release.zip" https://kartistt.com.tr/api/deploy

    - name: Verify deployment
      run: |
        echo "Deployment completed successfully via HTTP Webhook!"
        echo "Site should be back online at https://kartistt.com.tr"
