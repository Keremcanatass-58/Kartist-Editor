name: Kartist CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET 9.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Publish
      run: dotnet publish --no-build --configuration Release --output ./publish

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kartist-build-${{ github.run_number }}
        path: ./publish
        retention-days: 30

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: kartist-build-${{ github.run_number }}
        path: ./publish

    - name: Install lftp
      run: sudo apt-get install -y lftp

    - name: Enable Maintenance Mode
      env:
        FTP_SERVER: ${{ secrets.FTP_SERVER }}
        FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        lftp -e "
          set ftp:ssl-force true;
          set ssl:verify-certificate no;
          set ftp:passive-mode yes;
          set net:timeout 30;
          set net:max-retries 3;
          open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" $FTP_SERVER;
          cd httpdocs || exit 1;
          put app_offline.htm;
          bye;
        "

    - name: Wait for maintenance page to activate
      run: sleep 5

    - name: Deploy files to server
      env:
        FTP_SERVER: ${{ secrets.FTP_SERVER }}
        FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        lftp -e "
          set ftp:ssl-force true;
          set ssl:verify-certificate no;
          set ftp:passive-mode yes;
          set net:timeout 60;
          set net:max-retries 3;
          set mirror:parallel-transfer-count 5;
          open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" $FTP_SERVER;
          mirror --reverse --delete --verbose --exclude ^\.git/ --exclude ^\.github/ --exclude appsettings\.Development\.json --exclude app_offline\.htm ./publish/ httpdocs/;
          bye;
        "

    - name: Disable Maintenance Mode
      env:
        FTP_SERVER: ${{ secrets.FTP_SERVER }}
        FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        lftp -e "
          set ftp:ssl-force true;
          set ssl:verify-certificate no;
          set ftp:passive-mode yes;
          set net:timeout 30;
          open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" $FTP_SERVER;
          cd httpdocs || exit 1;
          rm -f app_offline.htm;
          bye;
        "

    - name: Verify deployment
      run: |
        echo "Deployment completed successfully!"
        echo "Site should be back online at https://kartistt.com.tr"
