<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#e2ff4a" />
            <stop offset="100%" stop-color="#9dcc00" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="15" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Koyu arka plan çemberi -->
    <circle cx="256" cy="256" r="230" fill="#0a0a0f" stroke="url(#neonGrad)" stroke-width="20" />
    
    <!-- İç derinlik -->
    <circle cx="256" cy="256" r="200" fill="#15151e" />
    
    <!-- Parlayan dış şimşek -->
    <path d="M290 100 L150 290 L250 290 L210 430 L380 230 L270 230 Z" 
          fill="url(#neonGrad)" 
          filter="url(#glow)" />
          
    <!-- Keskin iç şimşek -->
    <path d="M290 100 L150 290 L250 290 L210 430 L380 230 L270 230 Z" 
          fill="#c6ff00" />
</svg>
