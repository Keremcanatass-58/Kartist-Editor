<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartist - Bakım Modu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            color: #fff;
            overflow: hidden;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 8s ease-in-out infinite;
            z-index: 0;
        }

        .glow-orb.purple {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #8b5cf6, transparent 70%);
            top: -100px; right: -100px;
        }

        .glow-orb.blue {
            width: 300px; height: 300px;
            background: radial-gradient(circle, #3b82f6, transparent 70%);
            bottom: -80px; left: -80px;
            animation-delay: -4s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .icon-wrap {
            width: 120px; height: 120px;
            margin: 0 auto 2rem;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.3); }
            50% { box-shadow: 0 0 30px 10px rgba(139, 92, 246, 0.1); }
        }

        .icon-wrap svg {
            width: 60px; height: 60px;
            color: #8b5cf6;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, #c4b5fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .progress-bar {
            width: 200px;
            height: 4px;
            background: rgba(139, 92, 246, 0.15);
            border-radius: 4px;
            margin: 0 auto 2rem;
            overflow: hidden;
        }

        .progress-bar .fill {
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, #8b5cf6, #3b82f6);
            border-radius: 4px;
            animation: loading 1.5s ease-in-out infinite;
        }

        @keyframes loading {
            0% { transform: translateX(-100%); width: 30%; }
            50% { width: 60%; }
            100% { transform: translateX(400%); width: 30%; }
        }

        .info {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.35);
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="glow-orb purple"></div>
    <div class="glow-orb blue"></div>

    <div class="container">
        <div class="icon-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M11.42 15.17l-5.3-3.06a.75.75 0 010-1.3l5.3-3.06a.75.75 0 01.76 0l5.3 3.06a.75.75 0 010 1.3l-5.3 3.06a.75.75 0 01-.76 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M17.72 12.11l5.3 3.06a.75.75 0 010 1.3l-5.3 3.06a.75.75 0 01-.76 0l-5.3-3.06"/>
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M6.28 12.11l-5.3 3.06a.75.75 0 000 1.3l5.3 3.06a.75.75 0 00.76 0l5.3-3.06"/>
            </svg>
        </div>

        <h1>⚡ Kartist Güncelleniyor</h1>
        <p class="subtitle">
            Yeni özellikler ve iyileştirmeler üzerinde çalışıyoruz.<br>
            Kısa bir süre içinde geri döneceğiz!
        </p>

        <div class="progress-bar">
            <div class="fill"></div>
        </div>

        <p class="info">Planlanan süre: birkaç dakika</p>
    </div>
</body>
</html>
